name: Build NX30 Pro Firmware with Proxy

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential subversion libncurses5-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc wget unzip python3-distutils

      - name: Clone ImmortalWrt source via ghproxy
        run: |
          git clone -b mt7981 https://ghproxy.com/https://github.com/immortalwrt/immortalwrt.git source

      - name: Update feeds via ghproxy
        run: |
          cd source
          sed -i 's#https://downloads.openwrt.org#https://ghproxy.com/https://downloads.openwrt.org#g' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure base firmware
        run: |
          cd source
          cp configs/mt7981_defconfig .config
          # 核心软件包
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          # 删除不需要的软件包
          echo "CONFIG_PACKAGE_ppp=n" >> .config
          echo "CONFIG_PACKAGE_pppoe=n" >> .config
          echo "CONFIG_PACKAGE_ipv6=n" >> .config
          make defconfig

      - name: Build firmware
        run: |
          cd source
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: nx30pro-base-firmware
          path: source/bin/targets/mediatek/mt7981/*.bin
