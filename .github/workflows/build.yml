name: Build NX30 Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 這裡更新到了 v4，解決報錯

      - name: Install Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev swig libpython3-dev ecj fastjar
          
      - name: Clone Source
        run: |
          git clone --depth 1 https://github.com/hanwckf/immortalwrt-mt798x openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Config for NX30 Pro
        run: |
          cd openwrt
          # 下面是針對 NX30 Pro 的專屬配置
          echo "CONFIG_TARGET_mediatek=y" > .config
          echo "CONFIG_TARGET_mediatek_mt7981=y" >> .config
          echo "CONFIG_TARGET_mediatek_mt7981_DEVICE_h3c_magic-nx30-pro=y" >> .config
          make defconfig

      - name: Compile
        run: |
          cd openwrt
          # 這裡使用單線程 V=s，出錯時方便查看具體日誌
          make -j$(nproc) || make -j1 V=s

      - name: Upload
        uses: actions/upload-artifact@v4 # 這裡也更新到了 v4
        with:
          name: NX30-Pro-Firmware
          path: openwrt/bin/targets/mediatek/mt7981/*.bin
