name: Build NX30 Pro Custom Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git build-essential subversion libncurses5-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc wget unzip python3-distutils

      - name: Clone ImmortalWrt source
        run: |
          git clone -b mt7981 https://github.com/immortalwrt/immortalwrt.git source

      - name: Update feeds
        run: |
          cd source
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cd source
          # 使用 MT7981 默认配置
          cp configs/mt7981_defconfig .config
          # 添加必要软件包
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-ssl=y" >> .config
          echo "CONFIG_PACKAGE_adguardhome=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_passwall=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_PACKAGE_https-dns-proxy=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_ca-certificates=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          # 删除不需要的包，瘦身隐私优化
          echo "CONFIG_PACKAGE_ppp=n" >> .config
          echo "CONFIG_PACKAGE_pppoe=n" >> .config
          echo "CONFIG_PACKAGE_ipv6=n" >> .config
          echo "CONFIG_PACKAGE_odhcpd-ipv6only=n" >> .config
          echo "CONFIG_PACKAGE_samba4=n" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-core=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-upnp=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-ddns=n" >> .config
          echo "CONFIG_PACKAGE_luci-app-statistics=n" >> .config
          make defconfig

      - name: Build firmware
        run: |
          cd source
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v3
        with:
          name: nx30pro-firmware
          path: source/bin/targets/mediatek/mt7981/*.bin
